services:
  postgres:
    image: postgres:16
    container_name: backupdb-postgres
    environment:
      POSTGRES_USER: backupdb
      POSTGRES_PASSWORD: backupdb
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backupdb -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: backupdb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: backupdb
      MYSQL_DATABASE: appdb
      MYSQL_USER: backupdb
      MYSQL_PASSWORD: backupdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u backupdb -pbackupdb --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo:
    image: mongo:7
    container_name: backupdb-mongo
    command: ["mongod", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping')\""]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
  mysql-data:
  mongo-data:
